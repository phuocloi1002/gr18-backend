# =============================================
# APPLICATION CONFIGURATION
# =============================================
spring.application.name=restaurant-backend
server.port=${PORT:8080}
server.servlet.context-path=/api
server.address=0.0.0.0

# =============================================
# DATABASE CONFIGURATION
# =============================================
# Bi mat: xem env.example. MySQL: DB_PASSWORD hoac SPRING_DATASOURCE_PASSWORD (IntelliJ).
# Hoac profile local + application-local.properties (gitignore).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
# Spring Boot 3 t? nh?n di?n driver, d?ng n?y c? th? ?? ho?c b?
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Flyway gi? DDL; Hibernate ch? ki?m tra kh?p (tr?nh ch?nh s?a song song v?i migration)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# T?I-?U: X?a d?ng dialect c? v? n? ?? b? deprecated trong log c?a b?n.
# Hibernate 6 (Spring Boot 3) s? t? ??ng ch?n dialect ph? h?p nh?t.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect (B? D?NG N?Y)

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# =============================================
# JWT CONFIGURATION
# =============================================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =============================================
# MAIL CONFIGURATION (Gmail SMTP)
# =============================================
# L?u ?: password ? ??y ph?i l? "App Password" c?a Google, kh?ng ph?i m?t kh?u email th??ng
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# =============================================
# CLOUDINARY (MENU IMAGE STORAGE)
# =============================================
# Khuyen nghi: set qua bien moi truong/deployment secret, khong hardcode.
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# "image_dish" co the dung lam folder phan loai anh tren Cloudinary.
app.cloudinary.folder=${CLOUDINARY_FOLDER:image_dish}

# =============================================
# WEBSOCKET / REALTIME
# =============================================
app.websocket.allowed-origins=http://localhost:3000,http://localhost:5173

# =============================================
# SWAGGER / SPRINGDOC
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.restaurant.controller

# =============================================
# CORS
# =============================================
# Live Server (VS Code) cổng thường gặp; IP LAN không cần khai báo từng dải — đã có pattern 192.168.*.* trong LanCorsOriginPatterns
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5500,http://localhost:5501,http://127.0.0.1:5500,http://127.0.0.1:5501

# =============================================
# LOGGING
# =============================================
logging.level.com.restaurant=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# =============================================
# FLYWAY CONFIGURATION
# =============================================
spring.flyway.enabled=false
# Quan tr?ng: Cho ph?p Flyway t?o b?ng qu?n l? n?u DB ?? c? d? li?u t? tr??c
spring.flyway.baseline-on-migrate=true
# ?i?m b?t ??u c?a baseline (th??ng l? 0 ho?c 1)
spring.flyway.baseline-version=0
# ???ng d?n m?c ??nh ch?a file .sql
spring.flyway.locations=classpath:db/migration
# H? tr? t?t h?n cho MySQL
spring.flyway.validate-on-migrate=true
# Sua migration da chay -> checksum mismatch: dat app.flyway.repair-before-migrate=true, chay app 1 lan, roi doi lai false
app.flyway.repair-before-migrate=false

# ZALO NOTIFICATION (webhook trung gian)
app.zalo.enabled=false
app.zalo.webhook-url=

# S?a l?i d?ng URL: B? ch? -latest ?i
google.gemini.api.key=${GEMINI_API_KEY:}
google.gemini.url=https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent

# OAUTH2 / SOCIAL LOGIN (GOOGLE)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH2_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google