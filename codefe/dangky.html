<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Restaurant AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dangky.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  </head>
  <body>
    <!-- Navbar: index/customer-header.html (inject bởi index/customer-header.js) -->
    <header class="navbar navbar-expand-lg navbar-light bg-white px-4 py-2 sticky-top shadow-sm"></header>

    <section class="hero-section d-flex align-items-center">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-lg-7 text-white mb-5 mb-lg-0">
            <h1 class="display-4 fw-bold mb-3">AI Restaurant Experience</h1>
            <p class="lead mb-4">
              Đặt bàn - Gọi món - AI gợi ý món ăn và trải nghiệm nhà hàng thông
              minh
            </p>

            <div class="feature-box d-flex flex-column gap-3">
              <div class="feature-item p-3 rounded-3 d-flex align-items-center">
                <i class="fa-solid fa-qrcode fs-3 me-3"></i>
                <span class="fw-bold">Gọi món bằng QR</span>
              </div>
              <div class="feature-item p-3 rounded-3 d-flex align-items-center">
                <i class="fa-solid fa-robot fs-3 me-3"></i>
                <span class="fw-bold">AI gợi ý món ăn</span>
              </div>
              <div class="feature-item p-3 rounded-3 d-flex align-items-center">
                <i class="fa-solid fa-chart-line fs-3 me-3"></i>
                <span class="fw-bold">Đánh giá & lịch sử</span>
              </div>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="form-card p-5 shadow">
              <h2 class="text-center fw-bold mb-4">Đăng ký tài khoản</h2>

              <form id="registerForm" novalidate>
                <div class="mb-3">
                  <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fa-solid fa-user text-danger"></i></span>
                    <input type="text" id="fullName" class="form-control border-start-0" placeholder="Họ và tên" maxlength="200" />
                  </div>
                  <div class="invalid-feedback d-block" id="err-fullName"></div>
                </div>

                <div class="mb-3">
                  <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fa-solid fa-envelope text-primary"></i></span>
                    <input type="text" id="email" class="form-control border-start-0" placeholder="Email" />
                  </div>
                  <div class="invalid-feedback d-block" id="err-email"></div>
                </div>

                <div class="mb-3">
                  <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fa-solid fa-phone"></i></span>
                    <input type="tel" id="phone" class="form-control border-start-0" placeholder="Số điện thoại" maxlength="10" />
                  </div>
                  <div class="invalid-feedback d-block" id="err-phone"></div>
                </div>

                <div class="mb-3">
                  <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fa-solid fa-lock text-warning"></i></span>
                    <input type="password" id="password" class="form-control border-start-0" placeholder="Mật khẩu" />
                  </div>
                  <div class="invalid-feedback d-block" id="err-password"></div>
                </div>

                <div class="mb-4">
                  <div class="input-group">
                    <span class="input-group-text bg-transparent"><i class="fa-solid fa-lock text-warning"></i></span>
                    <input type="password" id="confirmPassword" class="form-control border-start-0" placeholder="Xác nhận mật khẩu" />
                  </div>
                  <div class="invalid-feedback d-block" id="err-confirmPassword"></div>
                </div>

                <button type="submit" id="registerBtn" class="btn btn-orange w-100 text-white fw-bold py-2 mb-2">
                  Đăng ký
                </button>
                <div class="invalid-feedback d-block mb-2" id="err-server"></div>

                <p class="text-center">
                  Đã có tài khoản?
                  <a href="dangnhap.html" class="text-orange text-decoration-none fw-bold">Đăng nhập</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div class="social-floating d-flex flex-column gap-3 p-3">
        <a href="#" class="text-primary fs-3"
          ><i class="fa-brands fa-facebook"></i
        ></a>
        <a href="#" class="text-info fs-3"
          ><i class="fa-solid fa-message"></i
        ></a>
        <a href="#" class="text-danger fs-3"
          ><i class="fa-solid fa-location-dot"></i
        ></a>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="index/qr-session.js"></script>
    <script src="index/customer-header.js"></script>
    <script src="dangky.js"></script>
  </body>
</html>
