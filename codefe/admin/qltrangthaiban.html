<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trạng thái bàn | Restaurant AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="datcho.css">
    <link rel="stylesheet" href="siderbar.css">
    <link rel="stylesheet" href="qltrangthaiban.css">
</head>
<body class="bg-background">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <div class="container-fluid px-4 pt-4 pb-5">

            <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-start mb-4 gap-3 mt-2">
                <div>
                    <h2 class="page-title mb-1">Trạng thái bàn</h2>
                    <p id="table-status-toast" class="small text-secondary mb-0" role="status"></p>
                </div>
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <button type="button" class="btn btn-outline-primary btn-sm rounded-pill px-3" id="btn-refresh-table-status">
                        <span class="material-symbols-outlined fs-6 align-middle">refresh</span> Làm mới
                    </button>
                </div>
            </div>

            <div class="glass-legend p-3 rounded-4 border border-outline-variant/10 d-flex gap-4 flex-wrap shadow-sm mb-4">
                <div class="d-flex align-items-center gap-2">
                    <span class="dot bg-slate-500"></span>
                    <span id="count-available" class="smaller fw-bold text-secondary uppercase">TRỐNG: 0</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="dot bg-primary"></span>
                    <span id="count-occupied" class="smaller fw-bold text-primary uppercase">ĐANG DÙNG: 0</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="dot bg-tertiary"></span>
                    <span id="count-reserved" class="smaller fw-bold text-tertiary uppercase">ĐÃ ĐẶT: 0</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="dot bg-error"></span>
                    <span id="count-cleaning" class="smaller fw-bold text-error uppercase">CẦN DỌN: 0</span>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12">
                    <div class="hall-container p-4 rounded-4 bg-surface-container-low border border-outline-variant/10">
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                            <h5 class="fw-bold mb-0 text-primary-soft">Sơ đồ bàn (cập nhật theo thời gian thực)</h5>
                            <span class="smaller text-secondary">Chọn trạng thái trong ô bên dưới mỗi bàn để cập nhật.</span>
                        </div>

                        <div class="row g-3" id="table-status-grid">
                            <div class="col-12 text-secondary py-4 text-center">Đang tải…</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="component-loader.js"></script>
    <script src="qltrangthaiban.js"></script>
</body>
</html>
