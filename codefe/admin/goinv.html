<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gọi nhân viên | Restaurant AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="datcho.css"> 
    <link rel="stylesheet" href="siderbar.css">
    <link rel="stylesheet" href="goinv.css">
</head>
<body class="bg-background">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <div class="container-fluid px-4 pt-4 pb-5">
            
            <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-end mb-5 gap-4 mt-2">
                <div>
                    <h2 class="page-title mb-1">Gọi Nhân Viên</h2>
                    <p class="text-secondary mb-0 max-w-500">Theo dõi và phản hồi nhanh chóng các yêu cầu hỗ trợ trực tiếp từ khách hàng.</p>
                </div>
                
                
            </div>

            <div class="row g-4 mb-5">
                <div class="col-12 col-xl-8">
                    <div class="urgent-call-card rounded-5 p-4 h-100 d-flex flex-column justify-content-between border border-error-soft">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-4">
                            <div class="d-flex align-items-start gap-4">
                                <div class="table-urgent-number bg-error-container text-on-error-container rounded-4">
                                    <span class="smaller fw-bold opacity-70">BÀN</span>
                                    <h2 id="urgent-table-number" class="mb-0 fw-800">--</h2>
                                </div>
                                <div>
                                    <div class="d-flex align-items-center gap-3 mb-2">
                                        <span class="badge bg-error-container text-on-error-container rounded-pill px-3 fw-bold smaller">KHẨN CẤP</span>
                                        <span id="urgent-time" class="smaller text-secondary d-flex align-items-center gap-1">
                                            <span class="material-symbols-outlined fs-6">schedule</span> --
                                        </span>
                                    </div>
                                    <h4 id="urgent-title" class="fw-bold text-on-surface mb-1">Chưa có yêu cầu chờ xử lý</h4>
                                    <p id="urgent-note" class="small text-light-emphasis mb-0">Khi khách gọi nhân viên, yêu cầu mới sẽ xuất hiện tại đây.</p>
                                </div>
                            </div>
                            <button type="button" id="urgent-resolve-btn" class="btn btn-primary rounded-pill px-4 py-3 fw-bold d-flex align-items-center gap-2 shadow-primary" disabled>
                                <span class="material-symbols-outlined fs-5">done_all</span> Đánh dấu đã xử lý
                            </button>
                        </div>
                        <div class="progress bg-error-soft mt-4" style="height: 6px; border-radius: 10px;">
                            <div id="urgent-progress" class="progress-bar bg-error" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="request-table-card rounded-5 bg-surface-container border border-outline-variant/10 overflow-hidden shadow-sm">
                <div class="p-4 d-flex justify-content-between align-items-center border-bottom border-outline-variant/10">
                    <h5 class="fw-bold mb-0">Danh sách yêu cầu hiện tại</h5>
                    <div class="filter-btns d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-surface-high text-white px-3 rounded-3" data-filter="all">Tất cả</button>
                        <button type="button" class="btn btn-sm text-secondary px-3" data-filter="pending">Chưa xử lý</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table custom-call-table align-middle mb-0">
                        <thead>
                            <tr class="smaller fw-bold text-secondary uppercase tracking-widest">
                                <th class="ps-4">BÀN</th>
                                <th>MỤC ĐÍCH GỌI</th>
                                <th class="text-center">THỜI GIAN</th>
                                <th>TRẠNG THÁI</th>
                                <th class="text-end pe-4">HÀNH ĐỘNG</th>
                            </tr>
                        </thead>
                        <tbody id="call-request-body">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-secondary">Đang tải…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="component-loader.js"></script>
    <script src="goinv.js"></script>
</body>
</html>
