<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Đơn hàng | Restaurant AI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="datcho.css"> 
    <link rel="stylesheet" href="siderbar.css">
    <link rel="stylesheet" href="donhang.css">
</head>
<body class="bg-background">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <div class="container-fluid px-4 pt-4 pb-5">
            
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-5 gap-4">
                <div>
                    <h2 class="page-title mb-1">Đơn hàng đang hoạt động</h2>
                </div>
                <div class="filter-wrapper p-1 rounded-3 d-inline-flex">
                    <button class="btn btn-filter active" data-filter="ALL">Tất cả</button>
                    <button class="btn btn-filter" data-filter="PENDING">Đơn mới</button>
                    <button class="btn btn-filter" data-filter="PREPARING">Đang chuẩn bị</button>
                    <button class="btn btn-filter" data-filter="SERVING">Đang phục vụ</button>
                </div>
            </div>
            <div id="order-alert" class="d-none mb-3"></div>

            <div class="row g-4 mb-5">
                
                <div class="col-6 col-lg-4">
                    <div class="stat-pill h-100 p-4 d-flex align-items-center gap-4">
                        <div class="stat-icon bg-primary-container text-primary">
                            <span class="material-symbols-outlined">table_restaurant</span>
                        </div>
                        <div>
                            <p class="stat-label mb-0">ĐƠN ĐANG XỬ LÝ</p>
                            <p class="stat-number mb-0" id="stat-active-orders">0</p>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-lg-4">
                    <div class="stat-pill h-100 p-4 d-flex align-items-center gap-4">
                        <div class="stat-icon bg-tertiary-container text-tertiary">
                            <span class="material-symbols-outlined">account_balance_wallet</span>
                        </div>
                        <div>
                            <p class="stat-label mb-0">ĐƠN MỚI</p>
                            <p class="stat-number mb-0" id="stat-new-orders">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container-modern shadow-lg">
                <div class="table-header d-flex justify-content-between align-items-center p-4">
                    <h5 class="mb-0 fw-bold">Danh sách hóa đơn trực tiếp</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-icon-tool"><span class="material-symbols-outlined">filter_list</span></button>
                        <button class="btn btn-icon-tool"><span class="material-symbols-outlined">file_download</span></button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table custom-table-dark align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">MÃ BÀN</th>
                                <th>MÓN CHÍNH</th>
                                <th>KHÁCH</th>
                                <th>TỔNG TIỀN</th>
                                <th>TRẠNG THÁI</th>
                                <th class="text-end pe-4">THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="order-table-body"></tbody>
                    </table>
                </div>
                
                <div class="table-footer d-flex justify-content-between align-items-center p-3 px-4">
                    <span class="small text-secondary" id="order-table-meta">Đang tải danh sách đơn...</span>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="component-loader.js"></script>
    <script src="donhang.js"></script>
</body>
</html>
