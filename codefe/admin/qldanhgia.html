<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Đánh giá | Restaurant AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="datcho.css">
    <link rel="stylesheet" href="siderbar.css">
    <link rel="stylesheet" href="qldanhgia.css">
</head>
<body class="bg-background">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <div class="container-fluid px-4 pt-4 pb-5">
            <div class="mb-4">
                <h1 class="h4 fw-bold mb-1">Quản lý đánh giá</h1>
            </div>

            <div class="d-flex flex-column flex-lg-row gap-3 align-items-stretch align-items-lg-center justify-content-between mb-4">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <span class="smaller text-secondary text-uppercase fw-bold">Lọc:</span>
                    <button type="button" class="btn btn-primary btn-sm rounded-pill px-3 qldg-filter" data-vis="">Tất cả</button>
                    <button type="button" class="btn btn-surface-high btn-sm rounded-pill px-3 qldg-filter" data-vis="true">Đang hiển thị</button>
                    <button type="button" class="btn btn-surface-high btn-sm rounded-pill px-3 qldg-filter" data-vis="false">Đã ẩn</button>
                </div>
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <input type="search" id="qldg-search" class="form-control form-control-sm rounded-pill min-w-200" placeholder="Tìm theo tên, nội dung, món…" />
                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill" id="qldg-reload">
                        <span class="material-symbols-outlined fs-6 align-middle">refresh</span> Tải lại
                    </button>
                </div>
            </div>

            <div id="qldg-alert" class="alert d-none mb-3" role="alert"></div>

            <div class="row g-4" id="qldg-list">
                <div class="col-12 text-center text-secondary py-5" id="qldg-loading">Đang tải…</div>
            </div>

            <nav class="mt-4" id="qldg-pagination" aria-label="Phân trang"></nav>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="component-loader.js"></script>
    <script src="qldanhgia.js"></script>
</body>
</html>
