<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quản lý đặt chỗ | Restaurant AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="datcho.css"/>
    <link rel="stylesheet" href="siderbar.css"/>
    <link rel="stylesheet" href="datcho-page.css"/>
</head>
<body class="bg-background datcho-page">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <div class="container-fluid">
            <div class="row align-items-end mb-4">
                <div class="col-12 col-md-7 col-lg-8">
                    <h2 class="page-title mb-0">Danh sách đặt chỗ</h2>
                </div>
                <div class="col-12 col-md-5 col-lg-4 d-flex justify-content-md-end mt-3 mt-md-0">
                    <div class="filter-group w-100 w-md-auto">
                        <button type="button" class="filter-btn active" data-view-tab="list" id="btnViewList">Danh sách</button>
                        <button type="button" class="filter-btn" data-view-tab="calendar" id="btnViewCalendar" title="Lịch — sắp có">Lịch</button>
                        <div class="vr d-none d-sm-block"></div>
                        <div class="date-display flex-grow-1 flex-sm-grow-0">
                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                            <input id="filterDate" type="date" class="form-control form-control-sm border-0 bg-transparent p-0" style="max-width: 160px;">
                        </div>
                        <button type="button" id="btnToday" class="btn btn-sm ms-1">Hôm nay</button>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-12 col-lg-3">
                    <div class="stat-card mb-4">
                        <div class="relative z-1 position-relative" style="z-index: 1;">
                            <p class="stat-label">Tổng số khách</p>
                            <h3 class="stat-value mb-2" id="totalGuests">0</h3>
                            <p class="stat-trend mb-0" id="guestTrendText">—</p>
                        </div>
                        <span class="material-symbols-outlined bg-icon">groups</span>
                    </div>

                    <div class="status-card">
                        <h4 class="card-subtitle mb-4">Trạng thái</h4>
                        <div class="status-item">
                            <span>Đã xác nhận</span>
                            <span class="status-count-pill" id="confirmedCount">00</span>
                        </div>
                        <div class="status-item">
                            <span>Chờ xử lý</span>
                            <span class="status-count-pill" id="pendingCount">00</span>
                        </div>
                        <div class="status-item">
                            <span>Rủi ro vắng mặt</span>
                            <span class="status-count-pill" id="riskCount">00</span>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-lg-9">
                    <div class="table-container">
                        <div class="table-header">
                            <h3 class="table-title mb-0">Đặt chỗ sắp tới</h3>
                            <div class="table-actions d-flex gap-2">
                                <button type="button" class="tool-btn" aria-label="Lọc" title="Lọc (xem trong bộ lọc ngày)"><span class="material-symbols-outlined">filter_list</span></button>
                                <button type="button" class="tool-btn" aria-label="Xuất" title="Xuất dữ liệu"><span class="material-symbols-outlined">download</span></button>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table custom-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Thông tin khách</th>
                                        <th>Số khách</th>
                                        <th>Giờ &amp; Ngày</th>
                                        <th>Vị trí / Bàn</th>
                                        <th>Trạng thái</th>
                                        <th class="text-end">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="reservationTableBody"></tbody>
                            </table>
                        </div>
                        <div class="table-footer py-3">
                            <span id="footerInfo">Đang hiển thị dữ liệu</span>
                            <div class="pagination-dash" id="paginationDash" aria-label="Phân trang"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <button type="button" class="fab-add shadow-lg" data-bs-toggle="modal" data-bs-target="#editModal" title="Thêm / chỉnh sửa nhanh">
        <span class="material-symbols-outlined filled">add</span>
    </button>

    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg datcho-modal">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="editModalLabel">Thông tin đặt bàn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body pt-3">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="editName">Tên khách hàng</label>
                        <input id="editName" class="form-control" autocomplete="off">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="editPhone">Số điện thoại</label>
                        <input id="editPhone" class="form-control" autocomplete="off">
                    </div>
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label class="form-label fw-semibold" for="editTableId">Gán bàn (khu · sức chứa)</label>
                            <select id="editTableId" class="form-control">
                                <option value="">— Chưa gán bàn —</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="editGuests">Số khách</label>
                            <input id="editGuests" type="number" min="1" class="form-control">
                        </div>
                        <div class="col-12 col-md-6 mb-3">
                            <label class="form-label fw-semibold" for="editTime">Thời gian</label>
                            <input id="editTime" type="datetime-local" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary rounded-3 px-4" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary rounded-3 px-4 fw-semibold" onclick="updateReservation()">Lưu thay đổi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="component-loader.js"></script>
    <script src="datcho.js"></script>
</body>
</html>
