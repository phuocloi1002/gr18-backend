<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực đơn - Restaurant AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <!-- Navbar: customer-header.html (inject bởi customer-header.js) -->
    <header class="navbar navbar-expand-lg navbar-light bg-white px-4 py-2 sticky-top shadow-sm"></header>

    <!-- BG Slides -->
    <div class="menu-bg-slide active" id="bg-slide-0"></div>
    <div class="menu-bg-slide" id="bg-slide-1"></div>
    <div class="menu-bg-slide" id="bg-slide-2"></div>
    <div class="menu-bg-slide" id="bg-slide-3"></div>

    <div class="menu-bg-wrapper">
    <main class="container-xl py-4">
        <div id="table-qr-banner" class="d-none" role="status" aria-live="polite"></div>
<div class="search-container mx-auto mb-3 position-relative">
            <input type="text" id="searchInput" class="form-control rounded-pill ps-4 shadow-sm" placeholder="Tìm kiếm món ăn...">
            <i class="fa-solid fa-magnifying-glass position-absolute top-50 end-0 translate-middle-y me-3 text-muted"></i>
        </div>

        <div id="menu-danhmuc" class="px-1">
        <div class="cat-tab-bar mb-3" id="menu-cat-tab-bar" aria-label="Lọc theo danh mục">
            <button type="button" class="cat-tab active" data-filter="__all" onclick="chonMenuCategoryTab(this)">
                <i class="fa-solid fa-border-all me-1"></i>Tất cả
            </button>
        </div>
    
        </div>

        <section id="section-tatca" class="menu-section mb-5">
            <div id="menu-list">
                <p class="text-center text-muted">Đang tải món ăn...</p>
            </div>
        </section>

        <div class="text-center mt-4 mb-5">
            <button id="btn-xem-them" class="btn btn-light border rounded-pill px-5 shadow-sm"
                    style="display:none" onclick="xemThem()">
                Xem thêm
            </button>
        </div>
    </main>
    </div><!-- /.menu-bg-wrapper -->

    <footer class="bg-white pt-2 pb-2 border-top">
        <div class="container-xl">
            <div class="social-icons mb-2">
                <a href=""><i class="fa-brands fa-facebook fs-5 me-2 text-secondary"></i></a>
                <a href=""><i class="fa-brands fa-instagram fs-5 me-2 text-secondary"></i></a>
                <a href=""><i class="fa-brands fa-tiktok fs-5 me-2 text-secondary"></i></a>
                <a href=""> <i class="fa-brands fa-google fs-5 me-2 text-secondary"></i></a>
                <a href=""><i class="fa-brands fa-facebook-messenger fs-5 text-secondary"></i></a>  
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="contact-info small">
                        <p class="fw-bold mb-2">Liên hệ</p>
                        <p class="mb-1">SĐT: 0123456787</p>
                        <p class="mb-1">Gmail: abc@gmail.com</p>
                        <p>Địa chỉ: 12 Lê Duẩn, Đà Nẵng, Việt Nam</p>
                    </div>
                </div>
                <div class="col-md-6 text-end">
                    <div class="map-box shadow-sm border">
                        <!-- Embed OSM: khong can API key; tranh URL Google bi dut ky tu ... -->
                        <iframe title="Ban do"
                            src="https://www.openstreetmap.org/export/embed.html?bbox=108.195%2C16.045%2C108.235%2C16.075&amp;layer=mapnik&amp;marker=16.060,108.215"
                            width="100%" height="220" style="border:0;" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Chatbot -->
    <link rel="stylesheet" href="chatbot.css">
    <div id="chatbot-container"></div>
    <!-- Modal chọn số lượng -->
    <div class="modal fade" id="soLuongModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modal-ten-mon">Tên món</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-3 px-4">
                    <p class="text-muted mb-1">Giá: <span id="modal-gia-mon" class="fw-bold text-orange"></span></p>
                    <p class="text-muted mb-3">Chọn số lượng:</p>
                    <div class="d-flex align-items-center justify-content-center gap-3 mb-3">
                        <button class="btn btn-outline-secondary rounded-circle" style="width:38px;height:38px" onclick="thayDoiSoLuong(-1)">−</button>
                        <input type="number" id="soLuong-input" class="form-control text-center fw-bold fs-5" style="width:80px" min="1" max="99" value="1">
                        <button class="btn btn-outline-secondary rounded-circle" style="width:38px;height:38px" onclick="thayDoiSoLuong(1)">+</button>
                    </div>
                    <div class="text-start">
                        <label class="text-muted small fw-semibold mb-1 d-block">
                            <i class="fa-solid fa-pen-to-square me-1"></i>Ghi chú <span class="fw-normal">(tuỳ chọn)</span>
                        </label>
                        <textarea id="ghichu-input" class="form-control form-control-sm rounded-3" rows="2" maxlength="200"
                                  placeholder="VD: ít cay, không hành, thêm đá..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light border rounded-pill px-4" data-bs-dismiss="modal">Huỷ</button>
                    <button type="button" class="btn btn-orange rounded-pill px-4" onclick="xacNhanThemGio()">Thêm vào giỏ hàng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast thông báo giỏ hàng -->
    <div id="cart-toast" class="cart-toast--success" role="alert" aria-live="polite">
        <i class="fa-solid fa-check me-2 cart-toast-icon" aria-hidden="true"></i>
        <span id="cart-toast-msg">Đã thêm vào giỏ hàng!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="qr-session.js"></script>
    <script src="customer-header.js"></script>
    <script src="menu.js"></script>
    <script>
    (function () {
        var imgs = [
            'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1920&q=80',
            'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&q=80',
            'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1920&q=80',
            'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1920&q=80'
        ];
        var slides = imgs.map(function (url, i) {
            var el = document.getElementById('bg-slide-' + i);
            if (el) el.style.backgroundImage = 'url("' + url + '")';
            return el;
        });
        var current = 0;
        setInterval(function () {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 10000);
    })();
    </script>
    <script>
    // Load chatbot HTML
    fetch('chatbot.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('chatbot-container').innerHTML = data;

            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'chatbot.css';
            document.head.appendChild(link);

            const script = document.createElement('script');
            script.src = 'chatbot.js';
            script.onload = () => console.log("✅ Chatbot loaded OK");
            document.body.appendChild(script);
        })
        .catch(err => console.error("❌ Lỗi chatbot:", err));
    </script>
</body>
</html>
