<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

            </div>
        </div>

    <!-- Toast thông báo giỏ hàng -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="qr-session.js"></script>
    <script src="customer-header.js"></script>
    <script src="menu.js"></script>
    <script>
    (function () {
        var imgs = [
            'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1920&q=80',
            'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&q=80',
            'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1920&q=80',
            'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1920&q=80'
        ];
        var slides = imgs.map(function (url, i) {
            var el = document.getElementById('bg-slide-' + i);
            if (el) el.style.backgroundImage = 'url("' + url + '")';
            return el;
        });
        var current = 0;
        setInterval(function () {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 10000);
    })();
    </script>
    <script>
    // Load chatbot HTML
    fetch('chatbot.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('chatbot-container').innerHTML = data;

            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'chatbot.css';
            document.head.appendChild(link);

            const script = document.createElement('script');
            script.src = 'chatbot.js';
            script.onload = () => console.log("✅ Chatbot loaded OK");
            document.body.appendChild(script);
        })
        .catch(err => console.error("❌ Lỗi chatbot:", err));
    </script>
