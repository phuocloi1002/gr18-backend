    <script>
    (function () {
        var imgs = [
            'https://media.istockphoto.com/id/1428412216/vi/anh/m%E1%BB%…612&w=0&k=20&c=XlkgdgWuZyFTHDHNcL1up-zsMZrQRfXQXqwGvrbyshc=',
'https://media.istockphoto.com/id/649672568/vi/anh/c%E1%BA%B…612&w=0&k=20&c=SqQRCcX8_oLLUwCx1JJU-6JRbWgQLPx3aWDU8vaHJ_w=',
            'https://media.istockphoto.com/id/111861571/vi/anh/nh%C3%A0-…612&w=0&k=20&c=yIRU-JKWWSxBgGO4Xoj2mHwjOApFc_YAoeZj5N1yvTQ=',
            'https://media.istockphoto.com/id/483874502/vi/anh/b%E1%BB%9…48&w=is&k=20&c=_nsZ7c9-4bcEx1bNDH-j6CV1uKByfBlDx2h3jLX3j88='
        ];
        var slides = imgs.map(function (url, i) {
            var el = document.getElementById('bg-slide-' + i);
            if (el) el.style.backgroundImage = 'url("' + url + '")';
            return el;
        });
        var current = 0;
        setInterval(function () {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 10000);
    })();
    </script>
    <script>
    // Load chatbot HTML
    fetch('/index/chatbot.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('chatbot-container').innerHTML = data;

            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = '/index/chatbot.css';
            document.head.appendChild(link);

            const script = document.createElement('script');
            script.src = '/index/chatbot.js';
            script.onload = () => console.log("✅ Chatbot loaded OK");
            document.body.appendChild(script);
        })
        .catch(err => console.error("❌ Lỗi chatbot:", err));
    </script>
