<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Restaurant AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="giohang.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-light bg-white px-4 py-2 shadow-sm">
        <div class="container-xl">
            <a class="navbar-brand fw-bold text-orange" href="home.html">
                <i class="fa-solid fa-robot me-2"></i>Restaurant AI
            </a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                <a class="btn btn-sm btn-outline-secondary rounded-pill" id="link-back-menu" href="menu.html">← Thực đơn</a>
            </div>
        </div>
    </header>

    <main class="container-xl py-4">
        <section class="gh-hero mb-4 p-4 p-md-5">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                <div>
                    <p class="gh-kicker mb-1">
                        <i class="fa-solid fa-receipt me-2"></i>Đơn hàng tại bàn
                    </p>
                    <h1 class="h3 fw-bold mb-1">Giỏ hàng &amp; gửi đơn</h1>
                    <p class="text-muted small mb-0" id="table-info-line"></p>
                </div>
                <div class="gh-summary-box">
                    <p class="mb-1 text-muted small">Tóm tắt nhanh</p>
                    <p class="mb-0 fw-bold" id="cart-summary-text">0 món • Tổng 0 đ</p>
                </div>
            </div>
        </section>

        <div id="guest-order-alert" class="d-none mb-3"></div>

        <section class="gh-card mb-4 p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h6 fw-bold mb-0">Danh sách món đã chọn</h2>
                <button type="button" class="btn btn-sm btn-outline-danger rounded-pill d-none" id="btn-clear-cart">
                    <i class="fa-solid fa-trash-can me-1"></i>Xóa toàn bộ
                </button>
            </div>
            <div id="cart-body" class="mb-0">
                <p class="text-muted">Đang tải…</p>
            </div>
        </section>

        <div class="row g-4">
            <div class="col-lg-7">
                <section class="gh-card h-100 p-3 p-md-4">
                    <h2 class="h6 fw-bold mb-3">Thông tin gửi bếp</h2>
                    <div class="mb-3">
                        <label class="form-label" for="guestName">Tên gọi tại bàn <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="guestName" maxlength="100" placeholder="VD: Anh Tuấn bàn góc" autocomplete="name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="orderNote">Ghi chú đơn (tuỳ chọn)</label>
                        <textarea class="form-control" id="orderNote" rows="3" maxlength="500" placeholder="VD: dị ứng đậu phộng, ăn trễ 15 phút…"></textarea>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-orange px-4 rounded-pill fw-semibold" id="btn-submit-order" disabled>
                            Gửi yêu cầu đặt món
                        </button>
                        <button type="button" class="btn btn-outline-secondary px-4 rounded-pill fw-semibold" id="btn-call-staff">
                            Gọi nhân viên hỗ trợ
                        </button>
                    </div>
                    <p class="small text-muted mt-3 mb-0" id="guest-flow-mode"></p>
                </section>
            </div>
            <div class="col-lg-5">
                <section class="gh-card h-100 p-3 p-md-4">
                    <h2 class="h6 fw-bold mb-3">Trạng thái đơn hàng</h2>
                    <div id="order-status-box" class="pt-0"></div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="qr-session.js"></script>
    <script src="customer-header.js"></script>
    <script>
        (function () {
            var a = document.getElementById("link-back-menu");
            if (a && window.appendQrToHref) a.href = window.appendQrToHref("menu.html");
        })();
    </script>
    <script src="giohang.js"></script>
</body>
</html>
