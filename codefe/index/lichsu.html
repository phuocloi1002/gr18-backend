<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt món - Restaurant AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="lichsu.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-light bg-white px-4 py-2 sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-orange" href="home.html">
                <i class="fa-solid fa-robot me-2"></i>Restaurant AI
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="home.html"><i class="fa-solid fa-house me-1"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html"><i class="fa-solid fa-utensils me-1"></i>Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="datban.html"><i class="fa-solid fa-chair me-1"></i>Đặt bàn</a></li>
                    <li class="nav-item"><a class="nav-link" href="danhmuc.html"><i class="fa-solid fa-bars me-1"></i>Danh mục</a></li>
                    <li class="nav-item"><a class="nav-link active" href="lichsu.html"><i class="fa-solid fa-clock-rotate-left me-1"></i>Lịch sử</a></li>
                    <li class="nav-item"><a class="nav-link" href="danhgia.html"><i class="fa-solid fa-star me-1"></i>Đánh giá</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center gap-3">
                <i class="fa-solid fa-magnifying-glass cursor-pointer"></i>
                <button class="btn btn-orange px-3" onclick="window.location.href='datban.html'">Đặt bàn ngay</button>
                <div class="user-avatar-small" id="userAvatar"></div>
                <i class="fa-solid fa-cart-shopping fs-5 ms-2"></i>
            </div>
        </div>
    </header>

    <main class="history-wrapper py-5">
        <div class="container">
            <h2 class="fw-bold mb-4 text-white">Lịch sử đặt món / Đặt bàn</h2>

            <div class="history-card shadow-lg p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="btn-group filter-group shadow-sm">
                        <button id="filterAll" class="btn btn-orange-filter active px-4">ALL</button>
                        <button id="filterOrder" class="btn btn-light-filter px-3">Đơn hàng</button>
                        <button id="filterBooking" class="btn btn-light-filter px-3">Đặt bàn</button>
                    </div>
                    <div class="search-mini">
                        <button class="btn btn-light border shadow-sm"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table">
                        <thead>
                            <tr>
                                <th>Ngày</th>
                                <th>Loại</th>
                                <th>Chi tiết</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-5">
                                    <div class="spinner-border text-orange" role="status"></div>
                                    <p class="mt-2 text-muted">Đang tải lịch sử của bạn...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="floating-contact">
            <div class="contact-circle zalo"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" width="25"></div>
            <div class="contact-circle facebook"><i class="fa-brands fa-facebook-f"></i></div>
            <div class="contact-circle map"><i class="fa-solid fa-location-dot"></i></div>
        </div>
    </main>

    <div class="modal fade" id="reservationDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold text-orange"><i class="fa-solid fa-circle-info me-2"></i>Chi tiết đặt bàn</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4" id="modalContent">
                </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary btn-sm rounded-pill px-3" data-bs-dismiss="modal">Đóng</button>
                <button type="button" id="cancelBtnInModal" class="btn btn-danger btn-sm rounded-pill px-3 d-none">Hủy bàn</button>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="customer-header.js"></script>
    <script src="lichsu.js"></script>
</body>
</html>
